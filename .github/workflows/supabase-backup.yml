name: Supabase encrypted backup

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # upload-artifact@v5 hâlâ Node 20 uyarısı verebiliyor; runner Node 24’e geçirir
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo "${VERSION_CODENAME:-$VERSION_ID}")-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Install AWS CLI for remote storage
        if: ${{ vars.BACKUP_STORAGE_PROVIDER == 's3' || vars.BACKUP_STORAGE_PROVIDER == 'r2' }}
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Validate repository secrets (safe)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${BACKUP_ENCRYPTION_PASSWORD:-}" ]]; then
            echo "::error::Missing repository secret BACKUP_ENCRYPTION_PASSWORD"
            exit 2
          fi
          if [[ -z "${SUPABASE_DB_URL:-}" ]]; then
            echo "::error::Missing repository secret SUPABASE_DB_URL (Settings → Secrets → Actions, not Variables)"
            exit 2
          fi
          url="${SUPABASE_DB_URL#"${SUPABASE_DB_URL%%[![:space:]]*}"}"
          url="${url//$'\ufeff'/}"
          url="${url%%\' -c *}"
          url="${url%% -c *}"
          url="${url%\'}"
          if [[ "$url" != postgres://* && "$url" != postgresql://* ]]; then
            echo "::error::SUPABASE_DB_URL must start with postgresql:// (full connection string, not password-only)"
            echo "Length=${#url} first_chars=${url:0:20}"
            exit 2
          fi
          if [[ "$url" == *" "* ]]; then
            echo "::error::SUPABASE_DB_URL contains spaces — paste only the URI, not: psql '...' -c 'select 1'"
            exit 2
          fi
          if [[ "$url" != *@*pooler.supabase.com* && "$url" != *@*supabase.com* ]]; then
            echo "::warning::SUPABASE_DB_URL does not look like a Supabase pooler URI"
          fi
          echo "SUPABASE_DB_URL prefix OK (length=${#url})"

      - name: Test database connection (visio360_backup)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if ! psql --dbname="$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "select 1 as ok;"; then
            echo "::error::Supabase bağlantısı başarısız — GitHub secret SUPABASE_DB_URL içindeki şifre visio360_backup ile uyuşmuyor."
            echo "::error::Supabase SQL Editor'da sql/backup-user.sql parolasını kontrol edin; URI'yi Secrets'ta yenileyin."
            exit 1
          fi
          echo "Database connection OK"

      - name: Run encrypted backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
          BACKUP_STORAGE_PROVIDER: ${{ vars.BACKUP_STORAGE_PROVIDER || 'local' }}
          BACKUP_SCHEMAS: ${{ vars.BACKUP_SCHEMAS || 'public' }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ vars.BACKUP_S3_PREFIX || 'visio360/db' }}
          BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'auto' }}
        run: bash scripts/backup-supabase.sh

      - name: Upload local encrypted backup artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: encrypted-supabase-backup
          path: backups/*.enc*
          if-no-files-found: ignore
          retention-days: 7
